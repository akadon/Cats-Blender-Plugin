name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "**Before reporting:** make sure you're using the latest release and Blender 5.1+."

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Blender
        2. Import model
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: blender_version
    attributes:
      label: Blender version
      placeholder: "5.1.0"
    validations:
      required: true

  - type: input
    id: cats_version
    attributes:
      label: Cats version
      placeholder: "5.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error / logs
      description: Paste any errors from the Blender System Console (Window → Toggle System Console).
      render: shell
